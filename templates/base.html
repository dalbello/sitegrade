<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SiteGrade — Instant Website Health Report{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}Check your website's SSL, security headers, performance, tech stack, DNS, and mobile readiness in one click. Get an A-F grade with a downloadable PDF report.{% endblock %}">
    <link rel="canonical" href="https://sitegrade.tinyship.ai{% block canonical_path %}/{% endblock %}">

    <!-- OG Tags -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://sitegrade.tinyship.ai/">
    <meta property="og:title" content="SiteGrade — Instant Website Health Report">
    <meta property="og:description" content="SSL, security headers, performance, tech stack, DNS &amp; mobile checks in one click. Get your A-F grade.">
    <meta property="og:image" content="https://sitegrade.tinyship.ai/static/img/og-image.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:site_name" content="SiteGrade">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="SiteGrade — Instant Website Health Report">
    <meta name="twitter:description" content="SSL, security headers, performance, tech stack, DNS &amp; mobile checks in one click.">
    <meta name="twitter:image" content="https://sitegrade.tinyship.ai/static/img/og-image.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://umami.app-ninja.com/script.js" data-website-id="66658128-6b4b-492a-9555-cd2a454972b6"></script>

    {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-950 min-h-screen text-gray-100">
    {% block content %}{% endblock %}

    <footer class="bg-gray-900 border-t border-gray-800 text-gray-500 py-8 mt-16">
        <div class="max-w-4xl mx-auto px-4 text-center text-sm">
            <p>&copy; 2026 <a href="https://tinyship.ai" class="text-emerald-400 hover:text-emerald-300">tinyship.ai</a></p>
            <p class="mt-2">
                <a href="/privacy/" class="hover:text-white">Privacy</a> ·
                <a href="/terms/" class="hover:text-white">Terms</a>
            </p>
        </div>
    </footer>

    {% block extra_js %}{% endblock %}
</body>
</html>
